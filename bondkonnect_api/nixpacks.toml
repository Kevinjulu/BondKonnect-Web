# nixpacks.toml for BondKonnect Backend
# This configuration ensures PHP 8.2 and all required extensions are installed correctly on Railway.

[phases.setup]
nixPkgs = [
    'php82',
    'php82Packages.composer',
    'php82Extensions.gd',
    'php82Extensions.bcmath',
    'php82Extensions.zip',
    'php82Extensions.intl',
    'php82Extensions.pdo_mysql',
    'php82Extensions.mbstring',
    'php82Extensions.xml',
    'php82Extensions.curl',
    'php82Extensions.ctype',
    'php82Extensions.tokenizer',
    'php82Extensions.dom',
    'php82Extensions.fileinfo'
]

[phases.install]
cmds = [
    'composer install --optimize-autoloader --no-interaction --no-progress'
]

[phases.build]
cmds = [
    'php artisan optimize'
]

[variables]
PHP_VERSION = '8.2'
NIXPACKS_PHP_EXTENSIONS = 'gd,bcmath,zip,intl,pdo_mysql,mbstring,xml,curl,ctype,tokenizer,dom,fileinfo'
