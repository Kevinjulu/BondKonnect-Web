# nixpacks.toml for BondKonnect Frontend (Next.js)

[phases.setup]
nixPkgs = ["nodejs_22"]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = ["npm run build"]

[start]
command = "HOSTNAME=0.0.0.0 PORT=$PORT node .next/standalone/server.js"

[variables]
NODE_ENV = "production"
HOSTNAME = "0.0.0.0"
NPM_CONFIG_OMIT = "dev"
